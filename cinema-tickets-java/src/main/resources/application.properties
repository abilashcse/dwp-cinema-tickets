management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

feature.logging.enabled=true

# Ticket pricing
ticket-pricing.adult=25
ticket-pricing.child=15
ticket-pricing.infant=0

# Rate limiting (applies to /api/*)
feature.rate-limit.enabled=true
rate-limit.capacity=5
rate-limit.refill-tokens=5
rate-limit.refill-period=PT10S

# Hosting (Render sets PORT)
server.port=${PORT:8080}
server.address=0.0.0.0

